name: Build Android Super App (Sawa Iraq)

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    name: Build APK & Verify compilation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'

    - name: Populate environment example as sandbox credential
      run: |
        if [ ! -f .env ]; then
          cp .env.example .env
        fi
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        fi

    - name: Build Debug & Release APKs
      run: gradle assembleDebug --no-daemon

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SawaIraq-Apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Prepare GitHub Pages Content 📦
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      run: |
        mkdir -p public
        cp web/index.html public/
        cp app/build/outputs/apk/debug/app-debug.apk public/

    - name: Deploy to GitHub Pages 🚀
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: public
        branch: gh-pages
